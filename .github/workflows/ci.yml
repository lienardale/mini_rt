name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            runs-on: ubuntu-22.04
            deps: sudo apt-get update && sudo apt-get install -y libx11-dev libxext-dev zlib1g-dev
          - distro: ubuntu-24.04
            runs-on: ubuntu-24.04
            deps: sudo apt-get update && sudo apt-get install -y libx11-dev libxext-dev zlib1g-dev
          - distro: debian-12
            runs-on: ubuntu-latest
            container: debian:12
            deps: apt-get update && apt-get install -y gcc make libx11-dev libxext-dev zlib1g-dev
          - distro: fedora-39
            runs-on: ubuntu-latest
            container: fedora:39
            deps: dnf install -y gcc make libX11-devel libXext-devel zlib-devel
          - distro: macos-15
            runs-on: macos-15
            deps: "true"

    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container || '' }}
    name: build (${{ matrix.distro }})

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.deps }}

      - name: Build project
        run: make all

      - name: Run unit tests
        run: make test

  regression:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev zlib1g-dev xvfb

      - name: Build project
        run: make all

      - name: Run BMP regression tests
        run: xvfb-run make regression

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev zlib1g-dev lcov

      - name: Generate coverage report
        run: make coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage/coverage.info 2>&1 | grep 'lines' | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 50" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${COVERAGE}% is below 50% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets 50% minimum threshold"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --error-exitcode=0 \
            -I includes -I libft \
            src/

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting with clang-format
        run: |
          clang-format --version
          clang-format --dry-run --Werror src/*.c includes/*.h 2>&1 || {
            echo ""
            echo "Formatting issues found. Run 'clang-format -i src/*.c includes/*.h' to fix."
            exit 1
          }
          echo "All files properly formatted."

  valgrind:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev zlib1g-dev valgrind

      - name: Build tests
        run: |
          make -C libft
          gcc -Wall -Wextra -Werror -g3 \
            -I includes -Ilibft -Imlx_linux -Itests \
            tests/test_math.c \
            src/ft_vectors.c src/ft_vectors_2.c src/ft_scalar.c \
            src/ft_matrix.c src/ft_pt.c src/ft_argb.c src/ft_cam.c \
            -Llibft -lft -lm -o run_test_math

      - name: Run Valgrind on tests
        run: valgrind --leak-check=full --error-exitcode=1 ./run_test_math
